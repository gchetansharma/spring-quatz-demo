# Quartz properties for prod environment
org.quartz.scheduler.instanceName=QuartzSchedulerProd
org.quartz.threadPool.threadCount=20
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.tablePrefix=QRTZ_
org.quartz.jobStore.dataSource=quartzDataSource
org.quartz.dataSource.quartzDataSource.driver=com.mysql.cj.jdbc.Driver
org.quartz.dataSource.quartzDataSource.URL=jdbc:mysql://prod-server:3306/quartz_prod
org.quartz.dataSource.quartzDataSource.user=prod_user
org.quartz.dataSource.quartzDataSource.password=prod_password
