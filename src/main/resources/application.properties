spring.application.name=spring-quatz-demo
spring.quartz.properties-location=classpath:quartz-${spring.profiles.active:dev}.properties

# Logging Job Configuration
job.logging.log-separator=========================================
job.logging.job-title=Quartz Job Executed - Weekday Scheduler
job.logging.execution-time-label=Execution Time:
job.logging.job-name-label=Job Name:
job.logging.job-group-label=Job Group:
job.logging.trigger-name-label=Trigger Name:
job.logging.next-fire-time-label=Next Fire Time:
job.logging.date-time-format=yyyy-MM-dd HH:mm:ss

# Default in-memory datasource (H2) so the application can start without an external DB
# This is suitable for local dev and tests. For staging/prod, provide proper datasource settings
# in the respective profile-specific properties files or via environment variables.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Expose Actuator endpoints over HTTP
management.endpoints.web.exposure.include=health,info,quartz,metrics

# Enable springdoc to show Actuator endpoints in Swagger-UI
springdoc.show-actuator=true


