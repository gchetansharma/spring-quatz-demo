spring.application.name=spring-quartz-demo

## By default (no active Spring profile) use the base quartz.properties file.
## Profile-specific files override this by setting the same property in
## application-<profile>.properties (see application-dev.properties etc.).
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate

# JPA / Hibernate: explicitly disable JTA integration when not using a JTA provider
# This avoids the HHH000489 "No JTA platform available" warning when running with local H2
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
spring.jpa.properties.hibernate.transaction.coordinator_class=jdbc

# Logging Job Configuration
job.logging.log-separator=========================================
job.logging.job-title=Quartz Job Executed - Weekday Scheduler
job.logging.execution-time-label=Execution Time:
job.logging.job-name-label=Job Name:
job.logging.job-group-label=Job Group:
job.logging.trigger-name-label=Trigger Name:
job.logging.next-fire-time-label=Next Fire Time:
job.logging.date-time-format=yyyy-MM-dd HH:mm:ss

# File-based H2 datasource for local dev (persists data between runs)
# This is suitable for local dev. For staging/prod, provide proper datasource settings
# in the respective profile-specific properties files or via environment variables.
spring.datasource.url=jdbc:h2:./data/quartz;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console Configuration
# Access at: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:./data/quartz
# Username: sa
# Password: (leave empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# Expose Actuator endpoints over HTTP
management.endpoints.web.exposure.include=health,info,quartz,metrics

# Enable springdoc to show Actuator endpoints in Swagger-UI
springdoc.show-actuator=true
