# Quartz properties for dev environment - using H2 JDBC JobStore

# Scheduler Configuration
org.quartz.scheduler.instanceName=QuartzSchedulerDev
org.quartz.scheduler.instanceId=AUTO
org.quartz.scheduler.skipUpdateCheck=true

# Thread Pool Configuration
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount=5
org.quartz.threadPool.threadPriority=5

# JobStore Configuration - Use JDBCJobStore with H2
# This persists job data to the H2 database
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.dataSource=quartz_datasource
org.quartz.jobStore.tablePrefix=QRTZ_
org.quartz.jobStore.useProperties=false
org.quartz.jobStore.misfireThreshold=60000

# DataSource Configuration - Points to H2 database
# Note: Spring Boot automatically provides a datasource bean named 'quartz_datasource'
# You can also define a custom datasource with @Bean annotation if needed
org.quartz.dataSource.quartz_datasource.driver=org.h2.Driver
org.quartz.dataSource.quartz_datasource.URL=jdbc:h2:./data/quartz;MODE=MySQL;AUTO_SERVER=TRUE
org.quartz.dataSource.quartz_datasource.user=sa
org.quartz.dataSource.quartz_datasource.password=
org.quartz.dataSource.quartz_datasource.maxConnections=5

# Plugin Configuration
org.quartz.plugin.triggHistory.class=org.quartz.plugins.history.LoggingTriggerHistoryPlugin
org.quartz.plugin.jobHistory.class=org.quartz.plugins.history.LoggingJobHistoryPlugin
org.quartz.plugin.shutdown.class=org.quartz.plugins.management.ShutdownHookPlugin
org.quartz.plugin.shutdown.cleanShutdown=true